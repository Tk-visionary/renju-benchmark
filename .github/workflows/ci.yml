name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: ruff check .
      - run: python -m pytest -q
      - run: python scripts/validate_puzzles.py data/puzzles.jsonl
      - run: python scripts/generate_puzzles.py --seed 42 --count-per-family 3 --output data/generated/ci.jsonl
      - run: python scripts/validate_puzzles.py data/generated/ci.jsonl
      - run: |
          python - <<'PY'
          import json
          from pathlib import Path

          records = Path("data/generated/ci.jsonl")
          preds = Path("data/generated/ci_predictions.jsonl")
          bad = Path("data/generated/ci_bad_predictions.jsonl")
          rows = []
          bad_rows = []
          for line in records.read_text().splitlines():
              if not line.strip():
                  continue
              record = json.loads(line)
              if record.get("track") == "rule_classification":
                  response = json.dumps({"class": record["expected"]})
                  bad_response = json.dumps({"class": "legal"})
              else:
                  moves = (
                      record.get("best_moves")
                      or record.get("good_moves")
                      or record.get("blocking_moves")
                      or ["H8"]
                  )
                  response = json.dumps({"move": moves[0]})
                  bad_moves = record.get("forbidden_moves") or ["P16"]
                  bad_response = json.dumps({"move": bad_moves[0]})
              rows.append(json.dumps({"id": record["id"], "response": response}))
              bad_rows.append(json.dumps({"id": record["id"], "response": bad_response}))
          preds.write_text("\n".join(rows) + "\n")
          bad.write_text("\n".join(bad_rows) + "\n")
          PY
      - run: python scripts/evaluate_records.py data/generated/ci.jsonl data/generated/ci_predictions.jsonl
      - run: python scripts/evaluate_records.py data/generated/ci.jsonl data/generated/ci_bad_predictions.jsonl
